    <!-- 字体非阻塞加载：preconnect 提前建立 TLS，preload 异步获取 CSS，font-display:swap 避免阻塞首屏文本渲染 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />

    <script>
      (function() {
        var stored = localStorage.getItem('theme-storage');
        var theme = 'dark';
        if (stored) {
          try {
            var parsed = JSON.parse(stored);
            theme = parsed.state && parsed.state.theme || 'dark';
          } catch (e) {}
        }
        document.documentElement.classList.add(theme);
        if (document.body) {
          document.body.style.backgroundColor = theme === 'dark' ? '#0F172A' : '#FFFFFF';
          document.body.style.color = theme === 'dark' ? '#F8FAFC' : '#1E293B';
        }
      })();
    </script>
